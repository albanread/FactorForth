[package]
name = "newfactor"
version = "0.1.0"
edition = "2021"
description = "A Rust ANS Forth compiler targeting Factor's VM."
license = "BSD-3-Clause"
readme = "README.md"

[lib]
name = "newfactor"
path = "src/lib.rs"

[[bin]]
name = "newfactor"
path = "src/main.rs"

[[bin]]
name = "factorforth-ui"
path = "src/bin/newfactor_ui.rs"

[[bin]]
name = "embed-smoke"
path = "src/bin/embed_smoke.rs"

# One-shot CLI: compresses factorforth.image → factorforth.image.zst for
# distribution.  Run after a fresh image build, ship the .zst (~30 MB
# vs 134 MB raw); the runtime inflates it on first start.
[[bin]]
name = "compress-image"
path = "src/bin/compress_image.rs"

# Dependencies ──────────────────────────────────────────────────────────────
#
# wf64: path dependency on the WF64 project for iGui (Direct2D/DirectWrite MDI
#       front-end).  WF64 is consumed read-only — we do not modify it.  Once
#       a real iGui crate is extracted upstream, this dep can be repointed.
#
# windows: Win32 API bindings, needed for LoadLibrary'ing factor.dll and for
#          the FFI seam.  Feature flags mirror what factor.dll's embedding
#          requires; we do not pull in UI subsystems here (those come via wf64).
#
# anyhow: error type for internal plumbing; user-facing errors go through
#         src/error.rs with ANS-style formatting.
#
# libloading: dynamic loading of factor.dll at runtime, avoiding link-time
#             dependency on the import library.

[dependencies]
# igui — our own Direct2D/DirectWrite MDI shell, forked from WF64's
# igui into crates/igui.  We depend on the window shell ONLY; we do
# NOT pull in WF64's Forth runtime, JASM assembler, or NewGC collector
# (we use Factor for all of that).  This is the decoupling: a broken
# sibling GC can never break our build again.
igui       = { path = "crates/igui" }
anyhow     = "1"
libloading = "0.8"
# zstd: image-compression for distribution.  The Factor bootstrap image
# is ~134 MB raw and compresses to ~30 MB at level 19.  Session inflates
# `factorforth.image.zst` → `factorforth.image` on first run if the raw
# file is missing.  The crate bundles the C decoder; no runtime dep on
# a system zstd.
zstd       = "0.13"

[build-dependencies]
embed-resource = "3"

[target.'cfg(windows)'.dependencies.windows]
version = "0.62"
features = [
    "Win32_Foundation",
    "Win32_System_LibraryLoader",
    "Win32_System_Memory",
    "Win32_System_Threading",
]

# ───────────────────────────────────────────────────────────────────────────

[profile.dev]
debug = 1

[profile.release]
lto = "thin"
opt-level = 3
debug = 1   # keep symbols for benchmarking / disassembly inspection
